server:
  port: 8083

spring:
  application:
    name: product-service

  shardingsphere:
    datasource:
      names: ds
      ds:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://127.0.0.1:3306/secondhand_trade?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: CHANGED_DB_PASS
        druid:
          initial-size: 5
          min-idle: 5
          max-active: 20
    rules:
      sharding:
        tables:
          product:
            actual-data-nodes: ds.product_$->{0..2}
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: mod-product
        sharding-algorithms:
          mod-product:
            type: MOD
            props:
              sharding-count: 3
    props:
      sql-show: false

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

  redis:
    host: 192.168.73.128
    port: 6379
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 1
    database: 2
    password: CHANGED_DB_PASS

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  mapper-locations: classpath:mapper/*.xml

seata:
  enabled: false
  enable-auto-data-source-proxy: false

logging:
  level:
    com.secondhand.product: info
