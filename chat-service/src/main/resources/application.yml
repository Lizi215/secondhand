server:
  port: 8084

spring:
  application:
    name: chat-service

  shardingsphere:
    datasource:
      names: ds
      ds:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://127.0.0.1:3306/secondhand_trade?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: CHANGED_DB_PASS
        druid:
          initial-size: 5
          min-idle: 5
          max-active: 20
    rules:
      sharding:
        tables:
          chat_message:
            actual-data-nodes: ds.chat_message_$->{0..2}
            table-strategy:
              standard:
                sharding-column: from_user_id
                sharding-algorithm-name: mod-msg
        sharding-algorithms:
          mod-msg:
            type: MOD
            props:
              sharding-count: 3
    props:
      sql-show: false

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

seata:
  enabled: false
  enable-auto-data-source-proxy: false

logging:
  level:
    com.secondhand.chat: info
